<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат | EriktiKZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .chat-container {
            max-width: 900px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }

        .chat-card {
            background: var(--bg);
            border-radius: 15px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 70vh;
        }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
        }

        .message.sent {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.received {
            background: var(--bg-alt);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
            display: block;
            text-align: right;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: var(--bg-alt);
            border-top: 1px solid var(--border);
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 25px;
            margin-right: 10px;
            background: var(--bg);
            color: var(--text);
        }

        .chat-input-area button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            transition: var(--transition);
        }

        .chat-input-area button:hover {
            background: var(--primary-dark);
        }

        .empty-chat {
            text-align: center;
            color: var(--text-light);
            padding: 40px;
        }
    </style>
</head>
<body>

                        </select>
                    </div>
                    <button id="modeToggleMobile" class="mode-toggle-btn"><i class="fas fa-moon"></i> Режим</button>
                    <a href="login.html" id="userLoginTriggerMobile" class="main-btn">Кіру/Тіркелу</a>
                </div>
            </nav>
            <div class="user-controls">
                <div class="language-selector">
                    <select id="languageSelect" onchange="window.changeLanguage(this.value)">
                        <option value="kk" selected>🇰🇿 Қазақша</option>

    <main class="chat-container">

            </div>
            <div class="chat-messages" id="chatMessages">

                    <p>Хабарламалар жоқ. Бірінші болып жазыңыз!</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Хабарламаңызды жазыңыз..." autocomplete="off">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i> Жіберу</button>
            </div>
