<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жобалар | EriktiKZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        /* Дополнительные стили только для страницы проектов */
        .project-page-layout {
            display: flex;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            gap: 30px;
        }

        .sidebar {
            width: 300px;
            background: var(--bg-alt);
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .sidebar h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--secondary);
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg);
            color: var(--text);
        }

        .project-list {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: var(--bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .project-card h4 {
            color: var(--primary);
            padding: 15px 15px 0;
            margin-bottom: 5px;
        }

        .project-card p {
            padding: 0 15px;
            font-size: 0.95rem;
            color: var(--text-light);
            flex-grow: 1;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 10px;
        }

        .project-meta span {
            display: flex;
            align-items: center;
            color: var(--secondary);
        }

        .project-meta i {
            margin-right: 5px;
        }

        .project-footer {
            padding: 15px;
            text-align: center;
        }

        @media (max-width: 900px) {
            .project-page-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>

            <div class="user-controls">

    <main>
        <h2 style="text-align: center; margin-top: 120px; color: var(--primary);">Активті Волонтерлік Жобалар 🌏</h2>

        <div class="project-page-layout">
            <!-- Боковая панель фильтров -->
            <div class="sidebar">
                <h3>Фильтрлер</h3>
                <div class="filter-group">
                    <label for="cityFilter"><i class="fas fa-city"></i> Қала</label>
                    <select id="cityFilter">
                        <option value="all">Барлық қалалар</option>
                        <option value="Алматы">Алматы</option>
                        <option value="Астана">Астана</option>
                        <option value="Шымкент">Шымкент</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="typeFilter"><i class="fas fa-tag"></i> Түрі</label>
                    <select id="typeFilter">
                        <option value="all">Барлық түрлері</option>
                        <option value="Экология">Экология</option>
                        <option value="Әлеуметтік">Әлеуметтік</option>
                        <option value="IT">IT</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="searchFilter"><i class="fas fa-search"></i> Іздеу</label>
                    <input type="text" id="searchFilter" placeholder="Атауы немесе сипаттама">
                </div>
            </div>

            <!-- Список проектов -->
            <div id="projectList" class="project-list">
                <!-- JS будет вставлять карточки -->
            </div>
